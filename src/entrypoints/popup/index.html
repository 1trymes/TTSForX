<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TTSForX</title>
    <link rel="icon" href="/icons/ttsforx-32.png" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="brand">
      <img
        class="brand-mark"
        src="/icons/ttsforx-48.png"
        width="40"
        height="40"
        alt=""
      />
      <div class="brand-copy">
        <h1>TTS for X</h1>
        <p>Read posts aloud</p>
      </div>
    </header>

    <main>
      <div class="field voice-field">
        <button
          id="voiceButton"
          class="voice-button"
          type="button"
          aria-haspopup="listbox"
          aria-expanded="false"
        >
          <span class="field-label voice-category">Voice</span>
          <span class="voice-current">
            <span id="voiceName">Male 1</span>
            <svg class="chevron" viewBox="0 0 12 8" aria-hidden="true">
              <path d="M1 1l5 5 5-5" />
            </svg>
          </span>
        </button>
        <div id="voiceList" class="voice-list" role="listbox" hidden></div>
      </div>

      <label class="field">
        <span class="slider-head">
          <span class="field-label">Speed</span>
          <em id="speedVal">1×</em>
        </span>
        <input id="speed" type="range" min="0.5" max="1.5" step="0.05" />
      </label>

      <label class="field">
        <span class="slider-head">
          <span class="field-label">Volume</span>
          <em id="volumeVal">100%</em>
        </span>
        <input id="volume" type="range" min="0" max="2" step="0.05" />
      </label>

      <label class="field">
        <span class="slider-head">
          <span class="field-label">Quality</span>
          <em id="stepsVal">8 · Balanced</em>
        </span>
        <input id="steps" type="range" min="0" max="1000" step="1" value="500" />
      </label>

      <label class="field toggle-field">
        <span class="field-label">Karaoke captions</span>
        <input id="karaoke" type="checkbox" />
      </label>

      <div class="field start-field">
        <button id="startFrom" class="start-button" type="button" disabled>
          <span class="field-label">Start from</span>
          <span class="start-action">
            <span>Select word</span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M5 3l13 9-7 2 4 7-2 1-4-7-4 4V3z" />
            </svg>
          </span>
        </button>
      </div>
    </main>

    <footer class="support-footer">
      <a
        class="footer-link support-link"
        href="https://ko-fi.com/trymes"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M4 6h13v8a5 5 0 0 1-5 5H9a5 5 0 0 1-5-5V6zm13 2h1.5a2.5 2.5 0 0 1 0 5H17V8z" />
          <path d="M7.2 10.2c0-1.7 2.1-2.3 3.1-.9 1-1.4 3.1-.8 3.1.9 0 1.5-1.7 2.7-3.1 3.8-1.4-1.1-3.1-2.3-3.1-3.8z" />
        </svg>
        <span>Support on Ko-fi</span>
      </a>
      <a
        class="footer-link model-link"
        href="https://huggingface.co/Supertone/supertonic-3"
        target="_blank"
        rel="noopener noreferrer"
        title="Supertonic 3 model and license"
      >
        <span>Voice by Supertone</span>
      </a>
    </footer>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
